name: Deploy to MilesWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    env:
      SSH_KEY_PATH: ${{ runner.temp }}/deploy_key

    steps:
      - name: Prepare SSH key
        shell: bash
        run: |
          if printf '%s' "${{ secrets.SSH_KEY }}" | grep -q '\\n'; then
            printf '%s' "${{ secrets.SSH_KEY }}" \
              | sed 's/\\n/\n/g' > "$SSH_KEY_PATH"
          else
            printf '%s' "${{ secrets.SSH_KEY }}" > "$SSH_KEY_PATH"
          fi
          chmod 600 "$SSH_KEY_PATH"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2

        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key_path: ${{ env.SSH_KEY_PATH }}

          script: |
            echo "Starting deployment..."

            cd ${{ vars.DEPLOY_PATH }}

            git fetch origin

            git reset --hard origin/main

            if [ -f composer.json ]; then
              composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
            fi

            if [ -f spark ]; then
              php spark migrate --all --force || true
              php spark cache:clear || true
            fi

            chmod -R 755 .

            echo "Deployment completed successfully."
