name: Deploy to MilesWeb

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest

    steps:
      - name: Prepare SSH key
        shell: bash
        env:
          RAW_SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if printf '%s' "$RAW_SSH_KEY" | grep -q '\\n'; then
            {
              printf 'SSH_KEY<<EOF\n'
              printf '%s\n' "$RAW_SSH_KEY" | sed 's/\\n/\n/g'
              printf 'EOF\n'
            } >> "$GITHUB_ENV"
          else
            {
              printf 'SSH_KEY<<EOF\n'
              printf '%s\n' "$RAW_SSH_KEY"
              printf 'EOF\n'
            } >> "$GITHUB_ENV"
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2

        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.USERNAME }}
          key: ${{ env.SSH_KEY }}

          script: |
            echo "Starting deployment..."

            cd ${{ vars.DEPLOY_PATH }}

            git fetch origin

            git reset --hard origin/main

            if [ -f composer.json ]; then
              composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction
            fi

            if [ -f spark ]; then
              php spark migrate --all --force || true
              php spark cache:clear || true
            fi

            chmod -R 755 .

            echo "Deployment completed successfully."
